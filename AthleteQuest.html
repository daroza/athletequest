/* ================================================================
   VOICE — Whisper (in-browser) speech-to-text + coach text-to-speech
   ================================================================ */
let mic={pipe:null, loading:false, rec:null, recording:false, chunks:[]};
function micBtnState(cls,label){ const b=$('mic-btn'); if(!b) return; b.className='btn mic'+(cls?' '+cls:''); b.innerHTML=label; }
async function loadWhisper(){
  if(mic.pipe) return mic.pipe;
  if(mic.loading) return null;
  mic.loading=true;
  micBtnState('busy','⏳');
  toast('Getting my ears ready — one-time download (~40MB)…','🎙️');
  try{
    const T=await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.1');
    mic.pipe=await T.pipeline('automatic-speech-recognition','Xenova/whisper-tiny.en',{
      dtype:'q8',
      progress_callback:p=>{ if(p.status==='progress' && p.file && p.file.indexOf('.onnx')>-1) micBtnState('busy',Math.round(p.progress||0)+'%'); }
    });
    toast('Voice is ready! Tap the mic and talk to me.','🎙️');
  }catch(e){
    mic.loading=false; micBtnState('','🎤');
    toast('Voice needs internet for first-time setup — try again later!','📡');
    return null;
  }
  mic.loading=false; micBtnState('','🎤');
  return mic.pipe;
}
async function toggleMic(){
  if(mic.recording){ try{mic.rec.stop();}catch(e){} return; }
  const pipe=await loadWhisper(); if(!pipe) return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mic.chunks=[]; mic.rec=new MediaRecorder(stream);
    mic.rec.ondataavailable=e=>{ if(e.data.size) mic.chunks.push(e.data); };
    mic.rec.onstop=async()=>{
      mic.recording=false;
      stream.getTracks().forEach(t=>t.stop());
      micBtnState('busy','✨');
      try{
        const buf=await new Blob(mic.chunks).arrayBuffer();
        const AC=window.AudioContext||window.webkitAudioContext;
        const ac=new AC({sampleRate:16000});
        const audio=await ac.decodeAudioData(buf);
        ac.close();
        const out=await pipe(audio.getChannelData(0));
        const text=(out && out.text ? out.text : '').replace(/\[.*?\]|\(.*?\)/g,'').trim();
        if(text){ $('chat-input').value=text; sendChat(); }
        else toast('I didn\'t catch that — try again a little louder!','👂');
      }catch(e){ toast('Hmm, couldn\'t understand the audio — try again!','👂'); }
      micBtnState('','🎤');
    };
    mic.rec.start();
    mic.recording=true;
    micBtnState('rec','⏹');
    toast('Listening… tap again when you\'re done!','🎙️');
  }catch(e){ toast('Mic blocked — allow microphone access to talk to your coach.','🎤'); }
}
const VOICE_PRESETS=[
  {id:'coach', n:'Coach',  e:'🎙️', pref:'male',   rate:1.0,  pitch:0.95},
  {id:'deep',  n:'Deep',   e:'🐻', pref:'male',   rate:0.95, pitch:0.78},
  {id:'hero',  n:'Hero',   e:'🦸', pref:'male',   rate:1.0,  pitch:0.88},
  {id:'bright',n:'Bright', e:'☀️', pref:'female', rate:1.06, pitch:1.18},
  {id:'warm',  n:'Warm',   e:'🤗', pref:'female', rate:0.97, pitch:1.04},
  {id:'robot', n:'Robo',   e:'🤖', pref:'any',    rate:0.92, pitch:0.6}
];
function voiceFor(pref){
  const vs=enVoices(); if(!vs.length) return null;
  const male=/male|david|mark|daniel|george|james|guy|ryan|alex|fred|oliver|thomas|brian|arthur|christopher|eric|andrew/i;
  const female=/female|zira|samantha|aria|susan|hazel|jenny|michelle|sonia|libby|victoria|karen|moira|tessa|emma|ava|natasha/i;
  if(pref==='female') return vs.find(x=>female.test(x.name)) || vs.find(x=>!male.test(x.name)) || vs[0];
  if(pref==='male')   return vs.find(x=>male.test(x.name)&&!female.test(x.name)) || vs.find(x=>!female.test(x.name)) || vs[0];
  return vs.find(x=>!female.test(x.name)) || vs[0];
}
function setVoicePreset(id){ if(state&&state.settings){ state.settings.voicePreset=id; save(); } }
function previewVoice(id){
  if(!window.speechSynthesis) return;
  const pr=VOICE_PRESETS.find(x=>x.id===id)||VOICE_PRESETS[0];
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance('Hey champ! This is your coach. Let\'s crush it today!');
    u.rate=Math.max(.5,Math.min(2,1.0*pr.rate));
    u.pitch=Math.max(0,Math.min(2,0.95*pr.pitch));
    const v=voiceFor(pr.pref); if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function speakClean(text){
  let s=String(text);
  // drop emoji / symbol ranges
  s=s.replace(/[\u{1F000}-\u{1FAFF}\u{2190}-\u{2BFF}\u{FE0F}\u{2600}-\u{27BF}]/gu,' ');
  // collapse stretched shouts so TTS doesn't sing them: GOOO->GO, yesss->yes
  s=s.replace(/([A-Za-z])\1{2,}/g,'$1');
  // times like 1:02.8 -> "1 minute 2.8 seconds"
  s=s.replace(/\b(\d{1,2}):(\d{2})(\.\d+)?\b/g,(m,a,b,c)=>{
    const secs=c?(parseInt(b,10)+parseFloat('0'+c)).toFixed(1):String(parseInt(b,10));
    return a+' minute'+(a==='1'?'':'s')+' '+secs+' second'+(secs==='1'?'':'s');
  });
  // math / units
  s=s.replace(/(\d)\s*[×x]\s*(\d)/g,'$1 by $2');           // 6×100 -> 6 by 100
  s=s.replace(/\b(\d+(?:\.\d+)?)\s*m\b/g,'$1 meters');      // 100m -> 100 meters
  s=s.replace(/\b(\d+)\s*\/\s*(\d+)\b/g,'$1 out of $2');    // 8/10 -> 8 out of 10
  s=s.replace(/#\s*(\d+)/g,'number $1');                    // Rule #1
  s=s.replace(/(\d)%/g,'$1 percent');
  // friendly acronyms
  s=s.replace(/\bPRs\b/g,'personal bests').replace(/\bPR\b/g,'personal best');
  s=s.replace(/\bXP\b/g,'X P').replace(/\bBPM\b/gi,'beats per minute').replace(/\bIM\b/g,'I M').replace(/\b5K\b/gi,'five K');
  // soften remaining ALL-CAPS words so the voice doesn't shout or spell them
  s=s.replace(/\b[A-Z]{2,}\b/g, w=> w[0]+w.slice(1).toLowerCase());
  // markdown / leftover punctuation
  s=s.replace(/[•✦▲▼*_~`>#]/g,' ').replace(/—/g,', ').replace(/\s+/g,' ').trim();
  return s;
}
function speak(text){
  if(!state || !state.settings.voice || !window.speechSynthesis) return;
  try{
    speechSynthesis.cancel();
    const clean=speakClean(text);
    if(!clean) return;
    const u=new SpeechSynthesisUtterance(clean);
    const p={hype:[1.12,1.02], chill:[0.95,0.92], wise:[0.9,0.8], goofy:[1.06,1.12]}[state.coach.personality]||[1,0.95];
    const pr=VOICE_PRESETS.find(x=>x.id===(state.settings.voicePreset||'coach'))||VOICE_PRESETS[0];
    u.rate=Math.max(.5,Math.min(2, p[0]*pr.rate));
    u.pitch=Math.max(0,Math.min(2, p[1]*pr.pitch));
    const v=coachVoice();
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function enVoices(){
  if(!window.speechSynthesis) return [];
  return speechSynthesis.getVoices().filter(v=>/^en/i.test(v.lang));
}
function coachVoice(){
  const vs=enVoices(); if(!vs.length) return null;
  if(state && state.settings.voiceName){
    const v=vs.find(x=>x.name===state.settings.voiceName);
    if(v) return v;
  }
  const pr=VOICE_PRESETS.find(x=>x.id===(state&&state.settings&&state.settings.voicePreset))||VOICE_PRESETS[0];
  return voiceFor(pr.pref);
}
function testVoice(){
  const was=state.settings.voice;
  state.settings.voice=true;
  speak('Hey champ! This is your coach speaking. Let\'s crush it today!');
  state.settings.voice=was;
}
function setVoiceName(n){ state.settings.voiceName=n||null; save(); toast('Coach voice updated!','🎙️'); testVoice(); }
if(window.speechSynthesis){
  speechSynthesis.getVoices(); // warm the voice list
  speechSynthesis.onvoiceschanged=()=>{ if(state && state.ui && state.ui.tab==='locker' && state.ui.lockerTab==='coach') renderLocker(); };
}

/* ---------- Boot ---------- */
function boot(){
  // floating bg deco
  const deco=['⭐','🏅','⚡','🏆','✨','🎽'];
  $('bgdeco').innerHTML=deco.map((e,i)=>`<span style="left:${(i*17+5)%92}%;top:${(i*23+8)%88}%;animation-delay:${i*0.8}s;animation-duration:${6+i}s;">${e}</span>`).join('');
  const saved=load();
  if(saved && saved.athlete){
    state=saved;
    if(!state.ui) state.ui={tab:'home',statsEvent:null,lockerTab:'jerseys'};
    if(!state.coach.av) state.coach.av=coachPreset(state.coach.style);
    if(state.settings.voice===undefined) state.settings.voice=true;
    if(state.settings.voiceName===undefined) state.settings.voiceName=null;
    if(state.settings.voicePreset===undefined) state.settings.voicePreset='coach';
    if(!state.settings.reminders) state.settings.reminders={enabled:false, time:'17:00', lastPrompted:null};
    if(!state.heart) state.heart=[];
    if(state.athlete.yearsPlaying===undefined) state.athlete.yearsPlaying=null;
    if(state.athlete.injuryFlag===undefined){ state.athlete.injuryFlag=false; state.athlete.injuryNote=''; }
    $('onboarding').classList.add('hidden');
    $('main').classList.remove('hidden');
    updateStreak(); ensureQuests();
    show('home');
    maybeNudge();
  } else {
    renderOB();
  }
  document.addEventListener('keydown',e=>{ if(e.key==='Enter' && document.activeElement===$('chat-input')) sendChat(); });
}
boot();
if('serviceWorker' in navigator){ window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
