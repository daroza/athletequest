<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6366F1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AthleteQuest AI 🏆</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-title" content="AthleteQuest">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#241b56; --ink2:#52527a; --card:#ffffff;
  --indigo:#6366F1; --purple:#8B5CF6; --blue:#38BDF8; --pink:#F472B6;
  --orange:#FB923C; --yellow:#FFD93D; --green:#34D399; --red:#FB7185;
  --shadow:0 6px 0 rgba(30,27,75,.10);
  --r:22px;
  font-size:16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Fredoka','Baloo 2',-apple-system,'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(180deg,#38BDF8 0%,#6366F1 52%,#8B5CF6 100%);
  background-attachment:fixed;
  min-height:100vh; color:var(--ink);
}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-deco span{position:absolute;font-size:42px;opacity:.16;animation:floaty 7s ease-in-out infinite;filter:saturate(.8);}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-18px) rotate(6deg)}}

#app{position:relative;z-index:1;max-width:460px;margin:0 auto;min-height:100vh;}
.hidden{display:none !important;}

h1,h2,h3{font-family:'Baloo 2','Fredoka',sans-serif;margin:0;}
h2{font-size:1.35rem;font-weight:800;}
h3{font-size:1.08rem;font-weight:700;}
p{margin:.4em 0;}
.muted{color:var(--ink2);font-size:.92rem;}
.tiny{font-size:.8rem;color:var(--ink2);}

/* ---------- Cards ---------- */
.card{
  background:var(--card); border-radius:var(--r); padding:16px 18px;
  box-shadow:var(--shadow); margin:14px 0; border:2px solid rgba(36,27,86,.06);
}
.card.pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.card-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}

/* ---------- Buttons ---------- */
.btn{
  font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.02rem;
  border:none;border-radius:18px;padding:13px 22px;cursor:pointer;color:#fff;
  background:linear-gradient(180deg,#FB923C,#F97316);
  box-shadow:0 5px 0 #c2570b; transition:transform .08s, box-shadow .08s;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #c2570b;}
.btn.indigo{background:linear-gradient(180deg,#818CF8,#6366F1);box-shadow:0 5px 0 #4338CA;}
.btn.indigo:active{box-shadow:0 1px 0 #4338CA;}
.btn.green{background:linear-gradient(180deg,#4ADE80,#22C55E);box-shadow:0 5px 0 #15803D;}
.btn.green:active{box-shadow:0 1px 0 #15803D;}
.btn.pink{background:linear-gradient(180deg,#F9A8D4,#EC4899);box-shadow:0 5px 0 #BE185D;}
.btn.pink:active{box-shadow:0 1px 0 #BE185D;}
.btn.ghost{background:rgba(255,255,255,.22);box-shadow:0 4px 0 rgba(0,0,0,.12);backdrop-filter:blur(4px);}
.btn.sm{padding:8px 14px;font-size:.9rem;border-radius:14px;}
.btn.big{width:100%;padding:16px;font-size:1.15rem;border-radius:20px;}
.btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.4);}
.btn.wear{background:linear-gradient(180deg,#A5B4FC,#818CF8);box-shadow:0 4px 0 #4F46E5;}

.chip{
  font-family:'Baloo 2',sans-serif;font-weight:700;font-size:.92rem;
  border:2.5px solid #E0E7FF;background:#F5F7FF;color:var(--ink);
  border-radius:999px;padding:9px 16px;cursor:pointer;transition:.12s;
  display:inline-flex;align-items:center;gap:6px;
}
.chip.on{border-color:var(--indigo);background:#EEF2FF;box-shadow:0 3px 0 #C7D2FE;transform:translateY(-1px);}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}

/* ---------- Inputs ---------- */
input[type=text],input[type=number],input[type=date],select,textarea{
  font-family:'Fredoka',sans-serif;font-size:1.02rem;color:var(--ink);
  border:3px solid #E0E7FF;border-radius:16px;padding:12px 14px;width:100%;
  background:#FAFAFF;outline:none;transition:border .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--indigo);}
label.fld{display:block;font-weight:600;font-size:.9rem;color:var(--ink2);margin:10px 0 4px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

input[type=range]{width:100%;accent-color:var(--indigo);height:34px;}

/* ---------- Header ---------- */
#hdr{
  position:sticky;top:0;z-index:40;margin:0 10px;padding-top:10px;
}
#hdr .bar{
  background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
  border-radius:20px;box-shadow:var(--shadow);padding:9px 12px;
  display:flex;align-items:center;gap:10px;border:2px solid rgba(36,27,86,.06);
}
#hdr .mini-av{width:46px;height:52px;flex:0 0 auto;}
#hdr .who{flex:1;min-width:0;}
#hdr .who .nm{font-family:'Baloo 2';font-weight:800;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.xpbar{height:12px;background:#E8EAFE;border-radius:999px;overflow:hidden;position:relative;margin-top:3px;}
.xpbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#4ADE80,#22C55E);position:relative;transition:width .6s cubic-bezier(.34,1.3,.64,1);}
.xpbar>i:after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.65) 50%,transparent 70%);animation:shine 2.4s infinite;}
@keyframes shine{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}
.statpills{display:flex;gap:6px;align-items:center;}
.pill{font-family:'Baloo 2';font-weight:800;font-size:.86rem;background:#FFF7DB;border:2px solid #FDE68A;border-radius:999px;padding:4px 9px;display:flex;gap:4px;align-items:center;}
.pill.flame{background:#FFF1E6;border-color:#FED7AA;}
.lvl-tag{font-size:.74rem;background:#EEF2FF;border:2px solid #C7D2FE;border-radius:999px;padding:2px 8px;font-weight:800;color:#4338CA;}

/* ---------- Views & Tabbar ---------- */
.view{padding:4px 14px 110px;}
#tabbar{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:50;
  width:min(440px,calc(100% - 20px));
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-radius:24px;box-shadow:0 8px 24px rgba(30,27,75,.25);
  display:flex;justify-content:space-around;padding:7px 6px;border:2px solid rgba(36,27,86,.06);
}
#tabbar button{
  background:none;border:none;cursor:pointer;font-family:'Baloo 2';font-weight:700;
  font-size:.68rem;color:#8688b8;display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:6px 10px;border-radius:16px;transition:.15s;min-width:56px;
}
#tabbar button .ti{font-size:1.45rem;line-height:1.2;transition:transform .2s;}
#tabbar button.on{background:#EEF2FF;color:#4338CA;}
#tabbar button.on .ti{transform:scale(1.18) translateY(-2px);animation:bounce .4s;}
@keyframes bounce{0%{transform:scale(.8)}60%{transform:scale(1.3) translateY(-4px)}100%{transform:scale(1.18) translateY(-2px)}}

/* ---------- Quests ---------- */
.quest{
  display:flex;align-items:center;gap:12px;background:#fff;border-radius:18px;
  padding:12px 14px;margin:10px 0;box-shadow:var(--shadow);border:2px solid rgba(36,27,86,.06);
  transition:.2s;
}
.quest .qi{font-size:1.7rem;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:#F5F7FF;border-radius:14px;flex:0 0 auto;}
.quest .qt{flex:1;}
.quest .qt b{display:block;font-size:.98rem;}
.quest .rw{font-size:.78rem;color:var(--ink2);font-weight:600;}
.quest.done{opacity:.62;background:#F0FDF4;border-color:#BBF7D0;}
.quest.done .qt b{text-decoration:line-through;}
.qbtn{border:none;border-radius:14px;font-family:'Baloo 2';font-weight:800;padding:9px 13px;cursor:pointer;background:linear-gradient(180deg,#4ADE80,#22C55E);color:#fff;box-shadow:0 4px 0 #15803D;font-size:.85rem;}
.qbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #15803D;}
.qbtn.auto{background:#EEF2FF;color:#6366F1;box-shadow:none;cursor:default;}
.qdone-check{font-size:1.6rem;}
.progress-track{height:14px;background:#E8EAFE;border-radius:999px;overflow:hidden;margin-top:6px;}
.progress-track>i{display:block;height:100%;background:linear-gradient(90deg,#A78BFA,#8B5CF6);border-radius:999px;transition:width .5s;}

/* ---------- Skill radar / gaps ---------- */
.radar-legend{display:flex;justify-content:center;gap:18px;padding:2px 0 8px;font-size:.8rem;font-weight:700;color:var(--ink2);}
.radar-legend span{display:flex;align-items:center;gap:6px;}
.radar-legend i{display:inline-block;width:16px;height:11px;border-radius:4px;}
.gap-call{display:flex;flex-direction:column;gap:8px;background:#FEF2F2;border:2px solid #FECACA;border-radius:14px;padding:10px 12px;margin:8px 0 2px;}
.gap-call.ok{background:#F0FDF4;border-color:#BBF7D0;text-align:center;font-weight:700;}
.gap-row{display:flex;gap:10px;align-items:flex-start;}
.gap-row>span{font-size:1.3rem;flex:0 0 auto;}
.gap-row b{display:block;font-size:.9rem;}
.gap-row .tiny{display:block;line-height:1.35;}

/* ---------- Chat ---------- */
#chatlog{display:flex;flex-direction:column;gap:10px;padding:6px 2px;min-height:200px;}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:88%;}
.msg .face{width:38px;height:38px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex:0 0 auto;border:2px solid #C7D2FE;}
.msg .bub{padding:11px 14px;border-radius:18px;font-size:.97rem;line-height:1.45;white-space:pre-wrap;}
.msg.coach .bub{background:#fff;border:2px solid rgba(36,27,86,.06);border-bottom-left-radius:6px;box-shadow:var(--shadow);}
.msg.me{align-self:flex-end;flex-direction:row-reverse;}
.msg.me .bub{background:linear-gradient(180deg,#818CF8,#6366F1);color:#fff;border-bottom-right-radius:6px;box-shadow:0 5px 0 #4338CA;}
.msg.pop{animation:msgpop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes msgpop{0%{transform:translateY(10px) scale(.9);opacity:0}100%{transform:none;opacity:1}}
#chatbar{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);width:min(440px,calc(100% - 20px));display:flex;gap:8px;z-index:45;}
#chatbar input{flex:1;border-radius:999px;border:3px solid #E0E7FF;box-shadow:var(--shadow);}
#chatbar .btn{border-radius:999px;padding:0 18px;}
#chatbar .btn.mic{background:linear-gradient(180deg,#A78BFA,#8B5CF6);box-shadow:0 5px 0 #6D28D9;padding:0 14px;}
#chatbar .btn.mic.rec{background:linear-gradient(180deg,#F87171,#EF4444);box-shadow:0 5px 0 #B91C1C;animation:micpulse 1s infinite;}
#chatbar .btn.mic.busy{background:#E0E7FF;color:#6366F1;box-shadow:none;font-size:.78rem;font-weight:800;}
@keyframes micpulse{50%{transform:scale(1.1);}}
.typing i{display:inline-block;width:8px;height:8px;border-radius:50%;background:#A5B4FC;margin:0 2px;animation:tp 1s infinite;}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes tp{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ---------- Avatar stage ---------- */
.stage{
  background:linear-gradient(180deg,#EEF2FF,#E0F2FE 70%,#D6F5E3);
  border-radius:20px;display:flex;align-items:flex-end;justify-content:center;
  padding:10px;position:relative;overflow:hidden;border:2px solid rgba(36,27,86,.06);
}
.stage:after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:62%;height:14px;background:rgba(36,27,86,.10);border-radius:50%;}
.stage svg{position:relative;z-index:2;}
.avwrap{animation:hover 3s ease-in-out infinite;}
@keyframes hover{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* ---------- Skill bars ---------- */
.skill-row{display:flex;align-items:center;gap:10px;margin:9px 0;}
.skill-row .si{font-size:1.3rem;width:36px;text-align:center;}
.skill-row .sn{width:96px;font-weight:700;font-size:.88rem;}
.skill-bar{flex:1;height:13px;background:#E8EAFE;border-radius:999px;overflow:hidden;}
.skill-bar>i{display:block;height:100%;border-radius:999px;transition:width .5s;}
.skill-lv{font-family:'Baloo 2';font-weight:800;font-size:.8rem;color:#6366F1;width:38px;text-align:right;}

/* ---------- Badges ---------- */
.badges{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.badge{
  background:#fff;border-radius:16px;padding:10px 4px;text-align:center;
  border:2px solid rgba(36,27,86,.06);box-shadow:var(--shadow);
}
.badge .be{font-size:1.8rem;display:block;}
.badge .bn{font-size:.68rem;font-weight:700;color:var(--ink2);line-height:1.15;display:block;margin-top:3px;}
.badge.locked{opacity:.42;filter:grayscale(1);}
.badge.new{animation:pop .5s;border-color:#FDE68A;background:#FFFBEB;}

/* ---------- Shop ---------- */
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.shop-item{background:#fff;border:2.5px solid #E0E7FF;border-radius:18px;padding:10px 6px;text-align:center;transition:.15s;}
.shop-item .se{font-size:2rem;display:block;}
.shop-item .sn{font-size:.74rem;font-weight:700;display:block;margin:4px 0 7px;line-height:1.15;min-height:2.1em;}
.shop-item.worn{border-color:#34D399;background:#F0FDF4;}
.shop-item button{width:100%;border:none;border-radius:11px;padding:7px 4px;font-family:'Baloo 2';font-weight:800;font-size:.78rem;cursor:pointer;}
.buybtn{background:linear-gradient(180deg,#FDE68A,#FBBF24);color:#7a4d00;box-shadow:0 3px 0 #B45309;}
.buybtn:active{transform:translateY(2px);box-shadow:0 1px 0 #B45309;}
.buybtn.cant{opacity:.5;}
.wearbtn{background:#EEF2FF;color:#4338CA;box-shadow:0 3px 0 #C7D2FE;}
.wornbtn{background:#D1FAE5;color:#047857;box-shadow:none;}

/* ---------- Stats / chart ---------- */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-tile{background:#F5F7FF;border-radius:16px;padding:10px 8px;text-align:center;border:2px solid #E0E7FF;}
.stat-tile .v{font-family:'Baloo 2';font-weight:800;font-size:1.18rem;color:#4338CA;}
.stat-tile .l{font-size:.7rem;font-weight:600;color:var(--ink2);}
.chart-wrap{background:#FAFAFF;border-radius:16px;border:2px solid #E0E7FF;padding:8px 4px 2px;margin:10px 0;}
.trend-up{color:#15803D;background:#DCFCE7;border:2px solid #BBF7D0;border-radius:999px;padding:3px 10px;font-weight:800;font-size:.8rem;}
.trend-down{color:#B45309;background:#FEF3C7;border:2px solid #FDE68A;border-radius:999px;padding:3px 10px;font-weight:800;font-size:.8rem;}
.pr-card{display:flex;align-items:center;gap:10px;background:#FFFBEB;border:2px solid #FDE68A;border-radius:16px;padding:10px 12px;margin:8px 0;}
.pr-card .pv{font-family:'Baloo 2';font-weight:800;font-size:1.15rem;margin-left:auto;color:#B45309;white-space:nowrap;}
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:2px dashed #EEF0FE;font-size:.92rem;}
.hist-item:last-child{border-bottom:none;}
.hist-item .he{font-size:1.3rem;}
.hist-item .hx{margin-left:auto;display:flex;align-items:center;gap:6px;}
.delbtn{border:none;background:#FEE2E2;color:#B91C1C;border-radius:10px;width:30px;height:30px;cursor:pointer;font-size:.9rem;}

/* ---------- Modal ---------- */
#modal-root{position:fixed;inset:0;z-index:90;display:none;align-items:flex-end;justify-content:center;}
#modal-root.open{display:flex;}
#modal-root .scrim{position:absolute;inset:0;background:rgba(30,27,75,.55);animation:fadein .2s;}
@keyframes fadein{from{opacity:0}}
#modal-card{
  position:relative;background:#fff;width:min(460px,100%);max-height:88vh;overflow-y:auto;
  border-radius:26px 26px 0 0;padding:20px 20px 28px;animation:slideup .3s cubic-bezier(.34,1.3,.64,1);
}
@media(min-width:500px){#modal-root{align-items:center}#modal-card{border-radius:26px;}}
@keyframes slideup{from{transform:translateY(60px);opacity:0}}
.modal-grab{width:46px;height:5px;background:#E0E7FF;border-radius:99px;margin:0 auto 12px;}
.xbtn{position:absolute;top:14px;right:14px;border:none;background:#F1F5F9;width:34px;height:34px;border-radius:50%;font-size:1rem;cursor:pointer;color:#64748B;font-weight:700;}

/* ---------- Toast ---------- */
#toast-zone{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:120;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:min(420px,92%);}
.toast{
  background:#fff;border-radius:999px;padding:10px 20px;font-family:'Baloo 2';font-weight:800;
  box-shadow:0 8px 24px rgba(30,27,75,.3);display:flex;gap:8px;align-items:center;
  animation:toastin .35s cubic-bezier(.34,1.56,.64,1);border:2px solid #EEF2FF;font-size:.95rem;text-align:center;
}
@keyframes toastin{0%{transform:translateY(-30px) scale(.8);opacity:0}100%{transform:none;opacity:1}}
.toast.out{animation:toastout .3s forwards;}
@keyframes toastout{to{transform:translateY(-24px);opacity:0}}

/* ---------- Level-up ---------- */
.levelup{text-align:center;padding:10px 0 4px;}
.levelup .burst{font-size:4.2rem;animation:spinpop .7s cubic-bezier(.34,1.56,.64,1);display:inline-block;}
@keyframes spinpop{0%{transform:scale(0) rotate(-180deg)}100%{transform:scale(1) rotate(0)}}
.levelup h2{font-size:2rem;background:linear-gradient(90deg,#F59E0B,#EC4899,#8B5CF6);-webkit-background-clip:text;background-clip:text;color:transparent;}

/* ---------- Onboarding ---------- */
#onboarding{min-height:100vh;min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding:12px 14px 16px;}
.ob-card{background:#fff;border-radius:24px;padding:18px 16px;box-shadow:0 14px 40px rgba(30,27,75,.3);animation:pop .4s cubic-bezier(.34,1.3,.64,1);}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.ob-dots i{width:9px;height:9px;border-radius:50%;background:#E0E7FF;transition:.2s;}
.ob-dots i.on{background:var(--indigo);width:24px;border-radius:99px;}
.sport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;}
.sport-cell{
  background:#F5F7FF;border:3px solid #E0E7FF;border-radius:18px;padding:12px 4px;text-align:center;cursor:pointer;transition:.13s;
}
.sport-cell .spe{font-size:2.1rem;display:block;}
.sport-cell .spn{font-size:.74rem;font-weight:700;color:var(--ink2);}
.sport-cell.on{border-color:var(--indigo);background:#EEF2FF;transform:scale(1.05);box-shadow:0 4px 0 #C7D2FE;}
.swatches{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 2px;}
.sw{width:38px;height:38px;border-radius:50%;border:3px solid #fff;outline:3px solid #E0E7FF;cursor:pointer;transition:.12s;}
.sw.on{outline-color:var(--indigo);transform:scale(1.14);}
.opt-row{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0;}
.splash-logo{text-align:center;}
.splash-logo .big{font-size:3rem;display:inline-block;animation:hover 3s ease-in-out infinite;}
.splash-logo h1{
  font-size:1.7rem;font-weight:800;line-height:1.05;
  background:linear-gradient(90deg,#4338CA,#7C3AED,#DB2777);-webkit-background-clip:text;background-clip:text;color:transparent;
}
@media(max-height:720px){
  .splash-logo .big{font-size:2.4rem;}
  .splash-logo h1{font-size:1.45rem;}
  .ob-card{padding:14px 14px;}
}
.builderwrap{display:grid;grid-template-columns:130px 1fr;gap:12px;align-items:start;}
@media(max-width:380px){.builderwrap{grid-template-columns:110px 1fr;}}
.buildlbl{font-size:.78rem;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-top:8px;}
.twinload{text-align:center;padding:30px 0;}
.twinload .orb{font-size:4rem;display:inline-block;animation:orbspin 1.6s linear infinite;}
@keyframes orbspin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
.loadbar{height:16px;background:#E8EAFE;border-radius:999px;overflow:hidden;margin:18px 10px 8px;}
.loadbar>i{display:block;height:100%;background:linear-gradient(90deg,#38BDF8,#8B5CF6,#EC4899);border-radius:999px;width:0%;transition:width .45s;}

/* ---------- Parent ---------- */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:8px 0;}
.cal-dot{aspect-ratio:1;border-radius:9px;background:#EEF0FE;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:#B9BDF0;font-weight:700;}
.cal-dot.hit{background:linear-gradient(180deg,#4ADE80,#22C55E);color:#fff;}
.bars{display:flex;align-items:flex-end;gap:14px;height:110px;padding:0 8px;}
.bars .bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.bars .b{width:100%;max-width:46px;background:linear-gradient(180deg,#A78BFA,#8B5CF6);border-radius:10px 10px 4px 4px;min-height:4px;transition:height .5s;}
.bars .bl{font-size:.68rem;color:var(--ink2);font-weight:700;}
.bars .bv{font-size:.72rem;font-weight:800;color:#6D28D9;}

/* ---------- Misc ---------- */
.quickrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.quick{
  border:none;background:#fff;border-radius:18px;padding:12px 6px;cursor:pointer;text-align:center;
  box-shadow:var(--shadow);border:2px solid rgba(36,27,86,.06);font-family:'Fredoka';transition:transform .1s;
}
.quick:active{transform:scale(.94);}
.quick .qe{font-size:1.7rem;display:block;}
.quick .ql{font-size:.74rem;font-weight:700;color:var(--ink2);}
.coach-bubble{
  background:#fff;border-radius:18px;border:2px solid rgba(36,27,86,.06);box-shadow:var(--shadow);
  padding:12px 14px;position:relative;font-size:.95rem;line-height:1.4;
}
.coach-bubble:before{content:'';position:absolute;left:-9px;top:18px;border:9px solid transparent;border-right-color:#fff;border-left:0;}
.twin-chip{background:#F5F3FF;border:2px solid #DDD6FE;border-radius:14px;padding:8px 10px;text-align:center;}
.twin-chip .v{font-family:'Baloo 2';font-weight:800;color:#6D28D9;font-size:1.05rem;}
.twin-chip .l{font-size:.68rem;color:var(--ink2);font-weight:700;}
.empty{
  text-align:center;padding:22px 10px;color:var(--ink2);
}
.empty .ee{font-size:2.6rem;display:block;margin-bottom:6px;}
.confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:200;}
.section-title{display:flex;align-items:center;gap:8px;margin:18px 4px 4px;color:#fff;text-shadow:0 2px 6px rgba(30,27,75,.3);}
.section-title h2{font-size:1.25rem;}
.wiggle{animation:wig .5s ease-in-out;}
@keyframes wig{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
.spark{animation:twinkle 1.3s infinite;}
.spark2{animation:twinkle 1.3s .4s infinite;}
.spark3{animation:twinkle 1.3s .8s infinite;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.15)}}
.flame{animation:flick .35s infinite alternate;}
@keyframes flick{from{transform:scaleY(1)}to{transform:scaleY(1.25) translateY(-2px)}}
.goalstar{filter:drop-shadow(0 0 4px #FDE68A);}

/* ---------- Heart check ---------- */
.pulse-heart{display:inline-block;animation:hrpulse .9s ease-in-out infinite;}
@keyframes hrpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.hr-guide{background:#FFF1F2;border:2px solid #FECDD3;border-radius:14px;padding:10px 12px;margin:8px 0;font-size:.88rem;line-height:1.55;}
.safe-note{background:#FEF2F2;border:2px solid #FECACA;border-radius:14px;padding:10px 12px;margin:8px 0;font-size:.88rem;line-height:1.5;}

/* ---------- Workout celebration animations ---------- */
.celebrate{position:relative;overflow:hidden;}
.celebrate .cwo,.celebrate .cw{display:inline-block;}
.celebrate svg .av-arm-l,.celebrate svg .av-arm-r,.celebrate svg .av-leg-l,.celebrate svg .av-leg-r{transform-box:fill-box;}
.celebrate svg .av-arm-l,.celebrate svg .av-arm-r{transform-origin:50% 12%;}
.celebrate svg .av-leg-l,.celebrate svg .av-leg-r{transform-origin:50% 8%;}
.celebrate .prop{position:absolute;z-index:3;}
.celebrate .wave{position:absolute;bottom:2px;font-size:30px;animation:wavemove 2.4s ease-in-out infinite;z-index:3;}
@keyframes wavemove{0%,100%{transform:translateX(-12px)}50%{transform:translateX(12px)}}
@keyframes hopY{from{transform:translateY(0)}to{transform:translateY(-14px)}}
/* jumping jacks (default) */
.anim-jacks .cwo{animation:hopY .5s ease-in-out infinite alternate;}
.anim-jacks .av-arm-l{animation:jjArmL .5s ease-in-out infinite alternate;}
.anim-jacks .av-arm-r{animation:jjArmR .5s ease-in-out infinite alternate;}
.anim-jacks .av-leg-l{animation:jjLegL .5s ease-in-out infinite alternate;}
.anim-jacks .av-leg-r{animation:jjLegR .5s ease-in-out infinite alternate;}
@keyframes jjArmL{from{transform:rotate(6deg)}to{transform:rotate(135deg)}}
@keyframes jjArmR{from{transform:rotate(-6deg)}to{transform:rotate(-135deg)}}
@keyframes jjLegL{from{transform:rotate(0)}to{transform:rotate(14deg)}}
@keyframes jjLegR{from{transform:rotate(0)}to{transform:rotate(-14deg)}}
/* running */
.anim-run .cwo{animation:hopY .35s ease-in-out infinite alternate;}
.anim-run .av-arm-l{animation:runArmL .35s ease-in-out infinite alternate;}
.anim-run .av-arm-r{animation:runArmL .35s ease-in-out infinite alternate-reverse;}
.anim-run .av-leg-l{animation:runLegL .35s ease-in-out infinite alternate;}
.anim-run .av-leg-r{animation:runLegL .35s ease-in-out infinite alternate-reverse;}
@keyframes runArmL{from{transform:rotate(-32deg)}to{transform:rotate(32deg)}}
@keyframes runLegL{from{transform:rotate(-24deg)}to{transform:rotate(24deg)}}
.anim-run .dash{animation:dashfade .7s linear infinite;font-size:24px;}
@keyframes dashfade{0%{opacity:0;transform:translateX(0)}30%{opacity:.9}100%{opacity:0;transform:translateX(-44px)}}
/* swimming */
.anim-swim .cwo{animation:swimbob 1.6s ease-in-out infinite;}
.anim-swim .cw{transform:rotate(-78deg);}
@keyframes swimbob{0%,100%{transform:translate(-16px,0)}50%{transform:translate(16px,-10px)}}
.anim-swim .av-arm-l{animation:windmill 1s linear infinite;}
.anim-swim .av-arm-r{animation:windmill 1s linear infinite;animation-delay:-.5s;}
@keyframes windmill{to{transform:rotate(-360deg)}}
.anim-swim .av-leg-l{animation:flutter .28s ease-in-out infinite alternate;}
.anim-swim .av-leg-r{animation:flutter .28s ease-in-out infinite alternate-reverse;}
@keyframes flutter{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}
/* basketball dribble */
.anim-dribble .cwo{animation:hopY .45s ease-in-out infinite alternate;}
.anim-dribble .av-arm-r{animation:dribArm .45s ease-in-out infinite alternate;}
@keyframes dribArm{from{transform:rotate(-55deg)}to{transform:rotate(-5deg)}}
.anim-dribble .bounceball{font-size:32px;animation:balldrib .45s ease-in-out infinite alternate;}
@keyframes balldrib{from{transform:translateY(-62px)}to{transform:translateY(0) scale(1,.9)}}
/* soccer juggle */
.anim-juggle .cwo{animation:hopY .6s ease-in-out infinite alternate;}
.anim-juggle .av-leg-l{animation:kickL .6s ease-in-out infinite alternate;}
.anim-juggle .av-leg-r{animation:kickL .6s ease-in-out infinite alternate-reverse;}
@keyframes kickL{from{transform:rotate(-26deg)}to{transform:rotate(8deg)}}
.anim-juggle .juggleball{font-size:32px;animation:jugg .6s ease-in-out infinite alternate;}
@keyframes jugg{from{transform:translate(-26px,0) rotate(-90deg)}to{transform:translate(26px,-48px) rotate(90deg)}}
/* bat & racquet swing */
.anim-swing .cw{animation:bodyTwist .9s ease-in-out infinite alternate;transform-origin:50% 80%;}
@keyframes bodyTwist{from{transform:rotate(-7deg)}to{transform:rotate(9deg)}}
.anim-swing .av-arm-r{animation:swingArmR .9s ease-in-out infinite alternate;}
.anim-swing .av-arm-l{animation:swingArmL .9s ease-in-out infinite alternate;}
@keyframes swingArmR{from{transform:rotate(-105deg)}to{transform:rotate(10deg)}}
@keyframes swingArmL{from{transform:rotate(70deg)}to{transform:rotate(-8deg)}}
.anim-swing .flyball{font-size:24px;animation:flyball 1.8s ease-out infinite;}
@keyframes flyball{0%{opacity:0;transform:translate(0,0)}12%{opacity:1}60%{opacity:1;transform:translate(74px,-74px) scale(.6)}100%{opacity:0;transform:translate(96px,-92px) scale(.45)}}
/* volleyball bump */
.anim-bump .cwo{animation:hopY .8s ease-in-out infinite alternate;}
.anim-bump .av-arm-l{animation:bumpArmL .8s ease-in-out infinite alternate;}
.anim-bump .av-arm-r{animation:bumpArmR .8s ease-in-out infinite alternate;}
@keyframes bumpArmL{from{transform:rotate(25deg)}to{transform:rotate(150deg)}}
@keyframes bumpArmR{from{transform:rotate(-25deg)}to{transform:rotate(-150deg)}}
.anim-bump .vball{font-size:30px;animation:vbArc .8s ease-in-out infinite alternate;}
@keyframes vbArc{from{transform:translateY(40px)}to{transform:translateY(-30px)}}
/* hockey skate */
.anim-skate .cwo{animation:skateX 1.8s ease-in-out infinite alternate;}
@keyframes skateX{from{transform:translateX(-36px)}to{transform:translateX(36px)}}
.anim-skate .cw{animation:skateLean 1.8s ease-in-out infinite alternate;transform-origin:50% 90%;}
@keyframes skateLean{from{transform:rotate(-7deg)}to{transform:rotate(7deg)}}
.anim-skate .av-leg-l{animation:strideL .45s ease-in-out infinite alternate;}
.anim-skate .av-leg-r{animation:strideL .45s ease-in-out infinite alternate-reverse;}
@keyframes strideL{from{transform:rotate(-14deg)}to{transform:rotate(14deg)}}
/* gymnastics cartwheel */
.anim-flip .cw{animation:cartwheel 1.7s cubic-bezier(.45,.05,.55,.95) infinite;transform-origin:50% 55%;}
@keyframes cartwheel{0%,18%{transform:rotate(0)}82%,100%{transform:rotate(360deg)}}
.anim-flip .av-arm-l{transform:rotate(150deg);}
.anim-flip .av-arm-r{transform:rotate(-150deg);}
</style>

<script>
"use strict";
/* ================================================================
   ATHLETEQUEST AI — core engine
   ================================================================ */

// ---------- Sport library ----------
const SPORTS = {
  swimming:{emoji:'🏊',name:'Swimming',unit:'time',events:['50m Freestyle','100m Freestyle','100m Backstroke','100m Breaststroke','100m Butterfly','200m Freestyle','200m IM'],
    drills:{
      speed:['sprint 25s all-out with FULL rest between — speed loves freshness, so make each one fast AND smooth','underwater dolphin kicks off every wall: 3–5 tight kicks in a streamline. Walls win races!','a few race-pace 50s with long rest, holding perfect stroke — fast, never thrashing'],
      endurance:['a steady 6×100 set holding the SAME pace each one — even pacing beats fast-then-fade','a longer easy swim with long relaxed strokes — this builds your engine','pull sets with a buoy to groove a long, strong catch while your legs rest'],
      technique:['catch-up drill + 6-kick switch — slow and perfect, reaching long and entering fingertips-first','fist drill: swim with closed fists to feel your forearm grab the water (the #1 freestyle fix)','fix the dropped elbow — keep a high elbow on the pull and roll from your hips, not your knees'],
      strength:['streamline kick sets — tight, fast flutter from the hips with relaxed feet making whitewater','dryland core: planks, hollow holds and flutter kicks for a straighter, faster body line','band rows and push-ups to build your pulling muscles — form first, no heavy weights yet'],
      recovery:['your shoulders work hard — gentle stretching and 9–10 hrs of sleep keep them happy and injury-free','refuel after practice with carbs + protein (chocolate milk is a classic) and sip water all day'],
      mental:['pick ONE technique cue per swim (like "long reach") and focus only on that — one thought, done well','nervous on the blocks? 3 slow breaths, picture your best race, then just swim YOUR race']}},
  track:{emoji:'🏃',name:'Track & Field',unit:'time',events:['100m Sprint','200m','400m','800m','1600m','Long Jump','High Jump'],
    drills:{
      speed:['short acceleration sprints, 10–20m, exploding from a strong start — focus on the push, not top speed','wall drives + A-skips first: drive the knee, stay tall, push the ground away','a few flat-out 30–40m sprints with LONG rest — sprinting fast is the best speed training when you\'re fresh'],
      endurance:['a relaxed 15–20 min run finishing with 4 smooth strides — a little base helps you recover between reps','tempo 150s at a strong-but-controlled effort with walk-back rest','an easy jog plus drills on tired days to keep the legs moving without grinding'],
      technique:['A-skips, B-skips and high knees — drive the knee up, foot landing under your hips, arms relaxed','practice the drive phase: stay leaned and patient the first 15–20m before rising up tall','for jumps, a consistent marked run-up beats a fast messy one — same steps every time'],
      strength:['hill sprints + bodyweight squats, lunges and calf hops — strong hips and hamstrings power your stride','plyometric hops and bounds with SOFT landings to build springy, explosive legs','a core circuit (planks, dead-bugs) so your power doesn\'t leak as you sprint'],
      recovery:['sprinting is high-impact — take real rest days. Muscles get faster while you sleep, not just while you train','warm up fully (jog + drills + strides) before any fast running; save the long stretches for after'],
      mental:['set a process goal for each rep ("drive 5 hard steps"), not just the time — control what you can control','on the line, take a breath and trust your training. Nerves are just fuel']}},
  running:{emoji:'👟',name:'Running / XC',unit:'time',events:['1 Mile','5K','800m','2 Mile'],
    drills:{
      speed:['6×200m at a quick-but-controlled pace with easy-jog rest — smooth and strong, not all-out','strides: 4–6 × 20 seconds of relaxed fast running after an easy day — quick legs, no straining','short hill repeats — power up, jog down. Builds speed AND strength together'],
      endurance:['an easy conversational-pace run 20–30 min — if you can\'t chat, slow down. This grows your engine','one slightly longer run a week, building distance gently — the aerobic base is your foundation','build your weekly distance by no more than about 10% — most running injuries come from doing too much too soon'],
      technique:['run tall and relaxed: eyes ahead, shoulders loose, quick light steps landing under your hips','running drills (high knees, butt-kicks) + strides to smooth out your form','practice even pacing — start races a touch easy and finish strong. Fast-starts fade'],
      strength:['a core circuit + single-leg balance work to keep your form solid when you get tired','bodyweight squats, lunges, calf raises and bridges — strong legs hold form late in a race','hill running doubles as strength: power without the pounding of flat-out sprints'],
      recovery:['easy days EASY, hard days hard — and at least one rest day. Recovery is when you actually get faster','sleep 9–10 hrs and refuel with carbs + protein after runs. Tired legs need fuel and rest, not more miles'],
      mental:['break the race into chunks — "just get to the next flag." Small goals beat one scary big one','when it hurts mid-race, relax your face and shoulders and focus on the runner ahead. Stay smooth']}},
  soccer:{emoji:'⚽',name:'Soccer',unit:'number',events:['Juggling Record','Sprint 40m (sec)','Shots on Target /10','Beep Test Level'],
    drills:{
      speed:['ladder/cone footwork + 5 short sprints WITH the ball — quick feet that still control it','sprint-and-cut drills: explode 10m, plant, change direction. Game speed is start-stop, not straight-line','short races to a loose ball — reaction plus acceleration win the 50/50s'],
      endurance:['small-sided games or 4×4-min keep-away — match-like running that\'s actually fun','interval shuttles (jog–sprint–jog) to handle the stop-start demands of a game','a steady jog with the ball to build a base while getting touches'],
      technique:['wall passes — 100 touches each foot, inside and outside. Weak-foot work makes you unpredictable','first-touch drill: receive and push the ball into space in one motion, ready for your next move','dribble a cone line with small close touches, eyes UP to read the field — control at speed'],
      strength:['lunges, squat-jumps and core holds — strong legs and core help you shield the ball and stay on your feet','single-leg balance and hops to protect your knees and ankles when you cut and land','bodyweight strength 2–3×/week — let your skills, not the gym, lead at your age'],
      recovery:['hydrate before, during and after — sip water on every break. Tired, dehydrated legs lose the late game','sleep and good food rebuild you after matches; rest any knocks and tell an adult about real pain'],

  basketball:{emoji:'🏀',name:'Basketball',unit:'number',events:['Free Throws /10','3-Pointers /10','Mile Time (sec)','Vertical Jump (in)'],

      strength:['jump squats, wall sits and med-ball chest passes — a base for jumping and finishing through contact','single-leg hops with soft landings to protect your knees and add to your vertical','core and bodyweight strength; heavy weights can wait — clean mechanics first'],

      mental:['shooting is confidence — keep the same form whether it went in or not. Next shot, same routine','on defense, talk and stay one play ahead. Effort and focus are yours to control every possession']}},
  baseball:{emoji:'⚾',name:'Baseball / Softball',unit:'number',events:['Throw Velocity (mph)','Home-to-1st (sec)','Hits /10 Pitches','Pop Time (sec)'],
    drills:{
      speed:['base-running starts — 6 reps reading the first explosive 2–3 steps off each base','short 10–20m sprints — quick first-step quickness steals bases and beats out hits','reaction starts on a coach\'s "go" to sharpen your jump'],
      endurance:['outfield pole-to-pole jogs ×6 to stay fresh deep into a doubleheader','light interval running so your legs and focus hold up late in games','all-around active play — baseball is start-stop, so build general fitness, not long slow miles'],
      technique:['tee work — 30 quality swings on a level, short path. See it, stay balanced, finish strong','throwing: point your stride foot at the target and reach full arm-cock as it lands — smooth, not muscled','soft-toss and front-toss to train timing and tracking the ball all the way in'],

    drills:{
      speed:['spider/fan drill ×4 — explode to each cone and recover to the middle. Tennis is first-step + recovery','split-step on every shot: a small hop as your opponent hits, then push off hard toward the ball','short sprints with direction changes to sharpen the start-stop movement of a rally'],

  volleyball:{emoji:'🏐',name:'Volleyball',unit:'number',events:['Serves In /10','Vertical Jump (in)','Pass Rating /3'],

      speed:['block-and-transition footwork ×8 — quick feet to the net, balanced base, then explode up','reaction shuffles and short sprints to chase down tips and free balls','approach footwork at speed: a sharp, repeatable last-two-steps powers your jump'],

const todayStr = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const dateAdd = (str,days) => { const d=new Date(str+'T12:00:00'); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); };

function hashStr(s){ let h=1779033703; for(let i=0;i<s.length;i++){ h=Math.imul(h^s.charCodeAt(i),3432918353); h=(h<<13)|(h>>>19);} return h>>>0; }
function rng(seed){ let a=seed; return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function seededPick(arr,n,seedStr){ const r=rng(hashStr(seedStr)); const copy=arr.slice(); for(let i=copy.length-1;i>0;i--){ const j=Math.floor(r()*(i+1)); [copy[i],copy[j]]=[copy[j],copy[i]]; } return copy.slice(0,n); }

// time helpers: "1:05.2" <-> seconds
function parseVal(str,unit){
  str=String(str).trim();
  if(unit==='time'){
    if(/^\d+:\d/.test(str)){ const p=str.split(':'); return parseFloat(p[0])*60+parseFloat(p[1]); }
    return parseFloat(str);
  }
  return parseFloat(str);
}
function fmtVal(v,unit){
  if(v==null||isNaN(v)) return '—';
  if(unit==='time'){
    if(v>=60){ const m=Math.floor(v/60); const s=v-m*60; return m+':'+ (s<10?'0':'') + s.toFixed(1); }
    return v.toFixed(1)+'s';
  }
  return (Math.round(v*10)/10).toString();
}

// ---------- Linear regression forecasting ----------
function regress(points){ // [{x,y}]
  const n=points.length; if(n<2) return null;
  let sx=0,sy=0,sxy=0,sxx=0;
  points.forEach(p=>{sx+=p.x;sy+=p.y;sxy+=p.x*p.y;sxx+=p.x*p.x;});
  const denom = n*sxx - sx*sx; if(Math.abs(denom)<1e-9) return null;
  const slope=(n*sxy - sx*sy)/denom, intercept=(sy - slope*sx)/n;
  const meanY=sy/n; let ssTot=0, ssRes=0;
  points.forEach(p=>{ const f=slope*p.x+intercept; ssRes+=(p.y-f)*(p.y-f); ssTot+=(p.y-meanY)*(p.y-meanY); });
  const r2 = ssTot<1e-9 ? 1 : Math.max(0,1-ssRes/ssTot);
  return {slope,intercept,r2,n};
}
function eventList(){
  const map={};
  state.results.forEach(r=>{ if(!map[r.event]) map[r.event]={event:r.event,unit:r.unit,lowerBetter:r.lowerBetter,count:0}; map[r.event].count++; });
  return Object.values(map).sort((a,b)=>b.count-a.count);
}
function resultsFor(ev){ return state.results.filter(r=>r.event===ev).sort((a,b)=>a.date<b.date?-1:1); }
function bestFor(ev){
  const rs=resultsFor(ev); if(!rs.length) return null;
  return rs.reduce((best,r)=> (r.lowerBetter ? (r.value<best.value?r:best) : (r.value>best.value?r:best)), rs[0]);
}
// Approximate, all-around age-group guide (~ages 11–13). NOT official standards.
// Times in seconds (lower = better). Anchored on USA Swimming motivational standards + youth track ranges.
const BENCH={
  swimming:{ '50m Freestyle':[['Developing',34.0],['Competitive',31.7],['Advanced',29.3]],
             '100m Freestyle':[['Developing',74.7],['Competitive',69.4],['Advanced',64.0]] },
  track:{ '100m Sprint':[['Developing',14.5],['Competitive',13.5],['Advanced',12.5]],
          '1600m':[['Developing',540],['Competitive',480],['Advanced',430]] },
  running:{ '1 Mile':[['Developing',570],['Competitive',510],['Advanced',450]] }
};
function benchInfo(ev){
  const lv=(BENCH[state.athlete.sport]||{})[ev]; if(!lv) return null;
  const best=bestFor(ev); if(!best || best.unit!=='time') return null;
  const v=best.value; let achieved=-1;
  for(let i=0;i<lv.length;i++){ if(v<=lv[i][1]) achieved=i; }
  const band=achieved>=0?lv[achieved][0]:'On the way';
  const next=achieved+1<lv.length?lv[achieved+1]:null;
  return {band, next, gap: next?Math.max(0, v-next[1]):null, unit:best.unit};
}
function benchHtmlFor(ev){
  const bi=benchInfo(ev); if(!bi) return '';
  return `<p class="tiny" style="margin-top:6px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:6px 8px;">📊 Level: <b>${esc(bi.band)}</b> ${bi.next?('— '+fmtVal(bi.gap,bi.unit)+' from <b>'+esc(bi.next[0])+'</b>'):'— top band, amazing! 🌟'} <span style="opacity:.65;">(approx. all-around guide, ~ages 11–13 — your coach can set a custom goal too)</span></p>`;
}
function dayAvg(rs){
  // collapse all results sharing a date into ONE averaged point (one point per day)
  const m={};
  rs.forEach(r=>{ (m[r.date]=m[r.date]||[]).push(r.value); });
  return Object.keys(m).sort((a,b)=>a<b?-1:1).map(d=>({date:d, value:m[d].reduce((s,v)=>s+v,0)/m[d].length, unit:rs[0].unit, lowerBetter:rs[0].lowerBetter, samples:m[d].length}));
}
function forecastFor(ev){
  const raw=resultsFor(ev); const rs=dayAvg(raw);   // need 3 DIFFERENT dates (same-day times averaged)
  if(rs.length<3) return {ok:false,need:3-rs.length,rs,raw};
  const t0=rs[0].date;
  const pts=rs.map(r=>({x:daysBetween(t0,r.date), y:r.value}));
  const reg=regress(pts); if(!reg) return {ok:false,need:1,rs};
  const lastX=pts[pts.length-1].x;
  const best=bestFor(ev).value;
  const lower=rs[0].lowerBetter;
  const clamp = v => lower ? Math.max(v, best*0.88) : Math.min(v, best*1.12);
  const predictAt = dStr => clamp(reg.slope*daysBetween(t0,dStr)+reg.intercept);
  const conf = (reg.r2>0.75 && reg.n>=4) ? 3 : (reg.r2>0.45 ? 2 : 1);
  // % change per month relative to mean
  const meanY = pts.reduce((s,p)=>s+p.y,0)/pts.length;
  const pctPerMonth = (reg.slope*30/meanY)*100;
  const improving = lower ? reg.slope<0 : reg.slope>0;
  return {ok:true, reg, rs, t0, lastX, predictAt, conf, pctPerMonth, improving, lower, unit:rs[0].unit};
}
function goalForecast(){
  // first goal with target value+event
  const g = state.goals.find(g=>g.event && g.target!=null);
  if(!g) return null;
  const f = forecastFor(g.event);
  const out = {goal:g, f};
  if(!f.ok) return out;
  const when = (g.date && daysBetween(todayStr(),g.date)>0) ? g.date : dateAdd(todayStr(),60);
  const pred = f.predictAt(when);
  const best = bestFor(g.event).value;
  const beats = f.lower ? pred<=g.target : pred>=g.target;
  const gapNow = f.lower ? best-g.target : g.target-best;
  let prob;
  if(beats){ prob = 62 + f.conf*9 + (f.improving?8:0); }
  else{
    const gapPct = Math.abs(pred-g.target)/Math.max(0.001,Math.abs(g.target))*100;
    prob = Math.max(8, 58 - gapPct*6 - (f.improving?0:14));
  }
  out.pred=pred; out.when=when; out.prob=Math.min(95,Math.round(prob)); out.beats=beats; out.gapNow=gapNow; out.best=best;
  return out;
}

// ---------- Athlete Twin (generated features) ----------
function computeTwin(){
  const t=todayStr();
  const last28 = state.workouts.filter(w=>daysBetween(w.date,t)<=28 && daysBetween(w.date,t)>=0);
  const last7  = state.workouts.filter(w=>daysBetween(w.date,t)<=7  && daysBetween(w.date,t)>=0);
  const perWeek = last28.length/4;
  const consistency = Math.min(100, Math.round(perWeek/4*100));
  const weeklyMin = Math.round(last28.reduce((s,w)=>s+(w.minutes||0),0)/4);
  const evs = eventList();
  const mainEvent = evs.length? evs[0].event : null;
  const fc = mainEvent ? forecastFor(mainEvent) : null;
  const recentRec = state.recovery.slice(-7);
  const avgSleep = recentRec.length? (recentRec.reduce((s,r)=>s+r.sleep,0)/recentRec.length) : null;
  const avgEnergy = recentRec.length? (recentRec.reduce((s,r)=>s+r.energy,0)/recentRec.length) : null;
  const recentFeel = last7.length? (last7.reduce((s,w)=>s+(w.feel||3),0)/last7.length) : null;
  let daysSince = null;
  if(state.workouts.length){ const lastW = state.workouts.reduce((a,b)=>a.date>b.date?a:b); daysSince = daysBetween(lastW.date,t); }
  return {consistency, weeklyMin, perWeek, mainEvent, fc, avgSleep, avgEnergy, recentFeel, daysSince,
          totalWorkouts:state.workouts.length, totalResults:state.results.length};
}

  let xp=state.game.xp, lv=1;
  while(xp >= xpToNext(lv)){ xp-=xpToNext(lv); lv++; }
  return {level:lv, into:xp, need:xpToNext(lv)};

function ensureQuests(){
  const t=todayStr(); const g=state.game;
  if(g.questDate!==t){
    const picks=seededPick(QUEST_POOL.filter(q=>q.id!=='practice'),2, t+(state.athlete?state.athlete.name:''));
    const pool=[QUEST_POOL[0], ...picks];
    g.daily = pool.map(q=>({qid:q.id, done:false}));
    g.questDate=t;
  }
  const wk=weekKey();
  if(g.weekKey!==wk){ g.weekKey=wk; g.week={workouts:0,dailies:0}; g.weeklyDone={}; }
  if(!g.weeklyDone) g.weeklyDone={};
  save();

  ensureQuests();
  const dq=state.game.daily.find(d=>d.qid===qid && !d.done);
  if(!dq) return;
  dq.done=true;
  const q=questDef(qid);
  state.game.questsCompleted++; state.game.week.dailies++;
  addCoins(q.coins);
  if(q.skill) addSkill(q.skill, 20);
  ding([659,880]); confetti(50);
  addXP(q.xp, 'Quest done!');
  checkWeekly(); save();
  if(!silent) renderCurrent();

/* ---------- FX: confetti, sound, toast, modal ---------- */
let confettiParts=[], confettiRunning=false;
function confetti(n){
  const c=$('confetti'); c.width=innerWidth; c.height=innerHeight;
  const colors=['#FFD93D','#FB7185','#34D399','#38BDF8','#A78BFA','#FB923C','#F472B6'];
  for(let i=0;i<n;i++){
    confettiParts.push({x:Math.random()*c.width, y:-20-Math.random()*120, vx:(Math.random()-.5)*3, vy:2+Math.random()*4,
      s:6+Math.random()*7, r:Math.random()*Math.PI, vr:(Math.random()-.5)*.3, col:colors[i%colors.length], shape:Math.random()>.5});
  }
  if(!confettiRunning){ confettiRunning=true; requestAnimationFrame(confettiTick); }
}
function confettiTick(){
  const c=$('confetti'), ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  confettiParts=confettiParts.filter(p=>p.y<c.height+30);
  confettiParts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.r+=p.vr;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.col;
    if(p.shape) ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);
    else{ ctx.beginPath(); ctx.arc(0,0,p.s/2,0,7); ctx.fill(); }
    ctx.restore();
  });
  if(confettiParts.length){ requestAnimationFrame(confettiTick); }
  else{ confettiRunning=false; ctx.clearRect(0,0,c.width,c.height); }
}
let audioCtx=null;
function ding(freqs){
  if(!state || !state.settings.sound) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    freqs.forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='triangle'; o.frequency.value=f;
      const t=audioCtx.currentTime + i*0.09;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.12,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
      o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.3);
    });
  }catch(e){}
}

function shade(hex,p){
  hex=(hex||'#888').replace('#','');
  if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  let r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  const t=p<0?0:255,a=Math.abs(p);
  r=Math.round((t-r)*a)+r; g=Math.round((t-g)*a)+g; b=Math.round((t-b)*a)+b;
  return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,x)).toString(16).padStart(2,'0')).join('');
}

/* ================================================================
   SKILL RADAR — spider chart: current levels vs sport-ideal profile
   ================================================================ */
function skillLevel(id){ return Math.floor((state.game.skills[id]||0)/100)+1; }
function radarGaps(){
  const ideal=IDEAL_PROFILES[state.athlete.sport]||IDEAL_PROFILES.other;
  return SKILL_DEFS.map(s=>({s, lv:skillLevel(s.id), tg:ideal[s.id]}))
    .map(o=>Object.assign(o,{gap:o.tg-o.lv}))
    .filter(o=>o.gap>0).sort((a,b)=>b.gap-a.gap);
}
function gapTip(id){
  const sport=SPORTS[state.athlete.sport]||SPORTS.other;
  if(sport.drills[id]) return 'Try: '+sport.drills[id];
  if(id==='recovery') return 'Log sleep and stretch sessions to grow recovery.';
  if(id==='mental') return 'Games, meets and coach chats grow mental strength.';
  return 'Keep training this skill!';
}
function radarSVG(){
  const MAX=10, cx=160, cy=128, R=92, n=SKILL_DEFS.length;
  const ideal=IDEAL_PROFILES[state.athlete.sport]||IDEAL_PROFILES.other;
  const pt=(i,v)=>{ const a=-Math.PI/2 + i*2*Math.PI/n; const r=R*Math.min(v,MAX)/MAX; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
  const poly=vals=>vals.map((v,i)=>pt(i,v).map(x=>x.toFixed(1)).join(',')).join(' ');
  const idealVals=SKILL_DEFS.map(s=>ideal[s.id]);
  const curVals=SKILL_DEFS.map(s=>skillLevel(s.id));
  const rings=[2,4,6,8,10].map(v=>`<polygon points="${poly(SKILL_DEFS.map(()=>v))}" fill="none" stroke="#E0E7FF" stroke-width="${v===10?2:1}"/>`).join('');
  const axes=SKILL_DEFS.map((s,i)=>{ const [x,y]=pt(i,MAX); return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#E0E7FF"/>`; }).join('');
  const labels=SKILL_DEFS.map((s,i)=>{ const [x,y]=pt(i,MAX+2.7); const gap=curVals[i]<idealVals[i];
    return `<text x="${x.toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="middle" font-size="15">${s.icon}</text>
      <text x="${x.toFixed(1)}" y="${(y+12).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="700" font-family="Baloo 2,sans-serif" fill="${gap?'#DC2626':'#16A34A'}">${curVals[i]}/${idealVals[i]}</text>`; }).join('');
  const dots=SKILL_DEFS.map((s,i)=>{ const [x,y]=pt(i,curVals[i]); return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${s.color}" stroke="#fff" stroke-width="2"/>`; }).join('');
  return `<svg viewBox="0 0 320 262" width="100%" xmlns="http://www.w3.org/2000/svg">
    ${rings}${axes}
    <polygon points="${poly(idealVals)}" fill="rgba(148,163,184,.12)" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6 5" stroke-linejoin="round"/>
    <polygon points="${poly(curVals)}" fill="rgba(99,102,241,.30)" stroke="#6366F1" stroke-width="3" stroke-linejoin="round"/>
    ${dots}${labels}
  </svg>
  <div class="radar-legend"><span><i style="background:rgba(99,102,241,.6);border:2px solid #6366F1;"></i>You now</span><span><i style="border:2px dashed #94A3B8;"></i>${esc((SPORTS[state.athlete.sport]||SPORTS.other).name)} ideal</span></div>`;
}

/* ================================================================

   ================================================================ */
function ensureHeart(){ if(!state.heart) state.heart=[]; }
function heartAvg(when){
  ensureHeart();
  const hs=state.heart.filter(h=>h.when===when).slice(-5);
  if(!hs.length) return null;
  return Math.round(hs.reduce((s,h)=>s+h.bpm,0)/hs.length)+' BPM';
}
function openHeartCheck(when){
  ensureHeart();
  const recent=state.heart.slice(-3).reverse();
  openModal(`<h2>💓 Heart Check</h2>
    <p class="muted">Do this <b>before</b> practice (rested) and <b>again after</b> — the difference shows how hard your engine worked!</p>
    <div class="hr-guide"><b>How to feel your heartbeat:</b><br>
      1️⃣ Turn one hand palm-up.<br>
      2️⃣ Put two fingers (never your thumb!) on your wrist just below your thumb — or softly on the side of your neck.<br>
      3️⃣ Wiggle your fingers a tiny bit until you feel the "thump-thump".<br>
      4️⃣ Hit start, count every thump for 15 seconds, then type your number!</div>
    <div style="text-align:center;margin:10px 0;">
      <button class="btn pink" id="hr-timer-btn" onclick="hrTimer()">▶️ Start 15-second count</button>
      <div style="font-size:1.9rem;margin-top:6px;"><span class="pulse-heart">💓</span></div>
    </div>
    <div class="row2">
      <div><label class="fld">Beats in 15 sec</label><input type="number" id="hr-beats" min="8" max="62" placeholder="22" inputmode="numeric" oninput="hrPreview()"></div>
      <div><label class="fld">When?</label><div class="chip-row" id="hr-when" style="margin-top:2px;">
        <button class="chip ${when==='after'?'':'on'}" data-id="before" onclick="pickChip(this,'hr-when')">Before</button>
        <button class="chip ${when==='after'?'on':''}" data-id="after" onclick="pickChip(this,'hr-when')">After</button>
      </div></div>
    </div>
    <p style="font-weight:800;color:#E11D48;min-height:1.3em;margin:4px 0;" id="hr-bpm"></p>
    <button class="btn big green" onclick="submitHeart()">Save my heart rate 💓</button>
    ${recent.length?'<label class="fld">Recent checks</label>'+recent.map(h=>`<div class="hist-item"><span class="he">💓</span><div><b>${h.bpm} BPM</b><div class="tiny">${shortDate(h.date)} • ${h.when==='after'?'after practice':'before practice'}</div></div></div>`).join(''):''}
    <p class="tiny" style="margin-top:8px;">🩺 As you get fitter, your <b>before</b> number slowly drops — that's your heart getting stronger! If your heart ever races while you're resting, feels fluttery, or you feel dizzy or your chest hurts — stop and tell a grown-up right away.</p>`);
}
function hrTimer(){
  const btn=$('hr-timer-btn');
  if(!btn || btn.dataset.run) return;
  btn.dataset.run='1';
  let t=15;
  btn.textContent='Counting… 15';
  ding([659]);
  const iv=setInterval(()=>{
    const b=$('hr-timer-btn');
    if(!b){ clearInterval(iv); return; }
    t--;
    if(t<=0){
      clearInterval(iv);
      b.textContent='⏰ Done! Type your beats below';
      delete b.dataset.run;
      ding([784,1047]);
      setTimeout(()=>{ const b2=$('hr-timer-btn'); if(b2 && !b2.dataset.run) b2.textContent='▶️ Start 15-second count'; },3000);
    } else b.textContent='Counting… '+t;
  },1000);
}
function hrPreview(){
  const b=parseInt($('hr-beats').value);
  $('hr-bpm').textContent=(b>=8&&b<=62)?('That\'s about '+(b*4)+' beats per minute (BPM)'):'';
}
function submitHeart(){
  const b=parseInt($('hr-beats').value);
  if(isNaN(b)||b<8||b>62){ toast('Beats in 15 seconds is usually 8–62. Try counting again!','💓'); return; }
  ensureHeart();
  const whenEl=document.querySelector('#hr-when .chip.on');
  const todayChecks=state.heart.filter(h=>h.date===todayStr()).length;
  const rec={id:uid(), date:todayStr(), when:whenEl?whenEl.dataset.id:'before', bpm:b*4};
  state.heart.push(rec);
  if(state.heart.length>120) state.heart=state.heart.slice(-120);
  closeModal();
  toast('Heart rate saved: '+rec.bpm+' BPM','💓');
  const today=state.heart.filter(h=>h.date===todayStr());
  const bef=today.filter(h=>h.when==='before').pop(), aft=today.filter(h=>h.when==='after').pop();
  if(bef&&aft&&aft.bpm>bef.bpm) setTimeout(()=>toast('Your heart pumped '+(aft.bpm-bef.bpm)+' BPM harder after practice — that\'s your engine training! 🚂','💪'),1400);
  if(todayChecks<2) addXP(10,'Heart check');
  save(); renderCurrent();
}

function ordinal(n){ n=parseInt(n); if(isNaN(n))return ''; const s=['th','st','nd','rd'],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

function chartSVG(f, goal){
  const W=360,H=215,PL=52,PR=14,PT=16,PB=30;
  const t0=f.t0;
  const lastDate=f.rs[f.rs.length-1].date;
  let endX=f.lastX+60;
  if(goal && goal.date) endX=Math.max(endX, daysBetween(t0,goal.date));
  const xs=f.rs.map(r=>daysBetween(t0,r.date));
  const ys=f.rs.map(r=>r.value);
  const lineEnd=f.reg.slope*endX+f.reg.intercept;   // true regression value → one continuous straight line (no hinge)
  let yMin=Math.min(...ys,lineEnd), yMax=Math.max(...ys,lineEnd);
  if(goal && goal.target!=null){ yMin=Math.min(yMin,goal.target); yMax=Math.max(yMax,goal.target); }
  const pad=(yMax-yMin)*0.18||1; yMin-=pad; yMax+=pad;
  const X=d=>PL+(d/endX)*(W-PL-PR);
  const Y=v=>PT+(1-(v-yMin)/(yMax-yMin))*(H-PT-PB);
  // gridlines
  let grid='';
  for(let i=0;i<=3;i++){
    const v=yMin+(yMax-yMin)*i/3;
    grid+=`<line x1="${PL}" y1="${Y(v)}" x2="${W-PR}" y2="${Y(v)}" stroke="#E8EAFE" stroke-width="1.5"/>
    <text x="${PL-6}" y="${Y(v)+4}" text-anchor="end" font-size="10" fill="#8688b8" font-family="Fredoka">${fmtVal(v,f.unit)}</text>`;
  }
  // trend line solid (data range) + dashed (forecast)
  const yAt=d=>f.reg.slope*d+f.reg.intercept;
  const clampY=v=>Math.max(PT,Math.min(H-PB,Y(v)));
  const solid=`<line x1="${X(xs[0])}" y1="${clampY(yAt(xs[0]))}" x2="${X(f.lastX)}" y2="${clampY(yAt(f.lastX))}" stroke="#8B5CF6" stroke-width="3.5" stroke-linecap="round"/>`;
  const dashed=`<line x1="${X(f.lastX)}" y1="${clampY(yAt(f.lastX))}" x2="${X(endX)}" y2="${clampY(lineEnd)}" stroke="#8B5CF6" stroke-width="3.5" stroke-dasharray="7 7" stroke-linecap="round" opacity=".75"/>`;
  // points
  const dots=f.rs.map((r,i)=>`<circle cx="${X(xs[i])}" cy="${Y(ys[i])}" r="6" fill="#6366F1" stroke="#fff" stroke-width="2.5"/>`).join('');
  // forecast star
  const star=`<text x="${X(endX)-4}" y="${clampY(lineEnd)+6}" font-size="20" class="goalstar">🌟</text>`;
  // goal line
  let goalLine='';
  if(goal && goal.target!=null){
    goalLine=`<line x1="${PL}" y1="${Y(goal.target)}" x2="${W-PR}" y2="${Y(goal.target)}" stroke="#EC4899" stroke-width="2.5" stroke-dasharray="4 5"/>
    <text x="${W-PR}" y="${Y(goal.target)-6}" text-anchor="end" font-size="11" fill="#DB2777" font-weight="700" font-family="Fredoka">🎯 goal ${fmtVal(goal.target,f.unit)}</text>`;
  }
  // x labels
  const xl=`<text x="${X(0)}" y="${H-8}" font-size="10" fill="#8688b8" font-family="Fredoka">${shortDate(t0)}</text>
  <text x="${X(f.lastX)}" y="${H-8}" font-size="10" fill="#8688b8" text-anchor="middle" font-family="Fredoka">${shortDate(lastDate)}</text>
  <text x="${X(endX)}" y="${H-8}" font-size="10" fill="#8B5CF6" text-anchor="end" font-weight="700" font-family="Fredoka">${shortDate(dateAdd(t0,endX))} ✨</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${grid}${goalLine}${solid}${dashed}${dots}${star}${xl}</svg>`;
}

function submitResult(){
  const ev=$('f-event').value.trim();
  const lower=$('f-lower').classList.contains('on');
  const unit=lower?'time':'number';
  const raw=$('f-value').value.trim();
  const v=parseVal(raw, /[:]/.test(raw)?'time':unit);
  if(!ev || isNaN(v)){ toast('Oops — need an event and a result!','🤔'); return; }
  if(v<=0){ toast('Results must be bigger than 0!','🤔'); return; }
  if(v>86400){ toast('That number looks impossible — double-check it!','🤔'); return; }
  const rd=$('f-date').value||todayStr();
  if(rd>todayStr()){ toast('Results can\'t be from the future! 📅','🤔'); return; }
  if(rd<'2015-01-01'){ toast('That date looks too old — double-check it!','🤔'); return; }
  const plcRaw=$('f-place').value;
  const plc=plcRaw?parseInt(plcRaw):'';
  if(plc!=='' && (isNaN(plc)||plc<1||plc>999)){ toast('Place should be between 1 and 999','🤔'); return; }
  const prevBest=bestFor(ev);
  const r={id:uid(), date:rd, event:ev, value:v, unit:(/[:]/.test(raw)||lower)?'time':'number', lowerBetter:lower, meet:$('f-meet').value.trim(), place:plc, pr:false};
  if(prevBest){ r.pr = lower ? v<prevBest.value : v>prevBest.value; }
  state.results.push(r);
  closeModal();
  if(r.pr){
    state.game.prs++; missionProgress('pr');
    confetti(200); ding([523,659,784,1047]);
    _lastWin={kind:'pr', big:fmtVal(v,r.unit), sub:ev};
    openModal(`<div class="levelup"><span class="burst">🚀</span><h2>NEW PERSONAL BEST!</h2>
      <p style="font-weight:800;font-size:1.3rem;">${esc(ev)}: ${fmtVal(v,r.unit)}</p>

function parseBulkDate(s){
  s=(s||'').trim(); if(!s) return null;
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2);
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){ let yr=m[3]; if(yr.length===2) yr='20'+yr; return yr+'-'+('0'+m[1]).slice(-2)+'-'+('0'+m[2]).slice(-2); }
  const d=new Date(s); if(!isNaN(d.getTime())) return d.toISOString().slice(0,10);
  return null;
}
function recomputePRs(){
  const best={};
  state.results.slice().sort((a,b)=>a.date<b.date?-1:1).forEach(r=>{
    const c=best[r.event];
    if(c==null){ r.pr=false; best[r.event]=r.value; }
    else { r.pr = r.lowerBetter ? r.value<c : r.value>c; if(r.pr) best[r.event]=r.value; }
  });
}
function submitBulk(){
  const txt=$('bulk-text').value||'';
  const lowerDefault=$('bulk-lower').classList.contains('on');
  const lines=txt.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  let added=0, skipped=0, lastEv=null;
  lines.forEach(line=>{
    const p=line.split(/\t|,/).map(s=>s.trim());
    if(p.length<3){ skipped++; return; }
    const ev=p[0], valRaw=p[1], dateRaw=p[2], meet=p[3]||'', placeRaw=p[4]||'';
    if(/^event$/i.test(ev) && isNaN(parseFloat(valRaw))){ return; } // header row
    const isTime=/[:]/.test(valRaw)||lowerDefault;
    const v=parseVal(valRaw, /[:]/.test(valRaw)?'time':(isTime?'time':'number'));
    const d=parseBulkDate(dateRaw);
    if(!ev || isNaN(v) || v<=0 || v>86400 || !d || d>todayStr() || d<'2015-01-01'){ skipped++; return; }
    let place=placeRaw?parseInt(placeRaw):''; if(place!=='' && (isNaN(place)||place<1||place>999)) place='';
    state.results.push({id:uid(), date:d, event:ev, value:v, unit:isTime?'time':'number', lowerBetter:isTime, meet, place, pr:false});
    added++; lastEv=ev;
  });
  recomputePRs();
  closeModal();
  if(added){
    if(lastEv) state.ui.statsEvent=lastEv;
    addXP(Math.min(added*10,80),'Imported '+added+' results');
    missionProgress('result'); checkBadges(); save(); show('stats');
    toast('Imported '+added+' result'+(added>1?'s':'')+(skipped?' • '+skipped+' row'+(skipped>1?'s':'')+' skipped':''),'📋');
  } else {
    toast('Couldn\'t read any rows — check the format (Event, Result, Date) and try again.','🤔');
  }
}

function submitEditResult(id){
  const r=state.results.find(x=>x.id===id); if(!r){ closeModal(); return; }
  const ev=$('f-event').value.trim();
  const lower=$('f-lower').classList.contains('on');
  const unit=lower?'time':'number';
  const raw=$('f-value').value.trim();
  const v=parseVal(raw, /[:]/.test(raw)?'time':unit);
  if(!ev || isNaN(v)){ toast('Oops — need an event and a result!','🤔'); return; }
  if(v<=0){ toast('Results must be bigger than 0!','🤔'); return; }
  if(v>86400){ toast('That number looks impossible — double-check it!','🤔'); return; }
  const rd=$('f-date').value||todayStr();
  if(rd>todayStr()){ toast('Results can\'t be from the future! 📅','🤔'); return; }
  if(rd<'2015-01-01'){ toast('That date looks too old — double-check it!','🤔'); return; }
  const plcRaw=$('f-place').value; const plc=plcRaw?parseInt(plcRaw):'';
  if(plc!=='' && (isNaN(plc)||plc<1||plc>999)){ toast('Place should be between 1 and 999','🤔'); return; }
  r.event=ev; r.value=v; r.unit=(/[:]/.test(raw)||lower)?'time':'number'; r.lowerBetter=lower;
  r.date=rd; r.meet=$('f-meet').value.trim(); r.place=plc;
  recomputePRs();
  closeModal();
  state.ui.statsEvent=ev;
  save(); renderCurrent();
  toast('Result updated!','✏️');
}

function buildICS(time){
  const p=(time||'17:00').split(':'); const hh=('0'+(p[0]||'17')).slice(-2), mm=('0'+(p[1]||'00')).slice(-2);
  const dt=todayStr().replace(/-/g,'')+'T'+hh+mm+'00';
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//AthleteQuest//EN','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT','UID:aq-'+Date.now()+'@athletequest','DTSTAMP:'+dt,'DTSTART:'+dt,'RRULE:FREQ=DAILY',
    'SUMMARY:AthleteQuest - log today\'s practice','DESCRIPTION:Open AthleteQuest and log your training to keep your streak alive!',
    'BEGIN:VALARM','TRIGGER:PT0M','ACTION:DISPLAY','DESCRIPTION:Time to train!','END:VALARM',
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
}
function addReminderToCalendar(){

function maybeNudge(){

function coachReply(msgRaw){
  const m=msgRaw.toLowerCase();
  const twin=computeTwin();
  const has=(...words)=>words.some(w=>m.includes(w));
  const hasWord=(...res)=>res.some(re=>re.test(m)); // word-boundary match to avoid substring collisions (eat/won/rest/goal/hi…)
  let body;

  // --- safety guardrails first ---
  if(has('hurt','pain','injur','sore','ache','dizzy','sick')){
    return pp(PERSONA[state.coach.personality].open)+'\n\nWhoa — your health comes FIRST, always. 🛑 If something hurts or feels wrong, stop training and tell a parent or your coach right away — and check with your family physician before you train or compete again, so they can make sure it\'s safe. Resting an injury isn\'t weakness — it\'s what smart athletes do.\n\nAnd remember Rule #1: never hurt yourself — proper technique beats pushing through pain, every time. Gentle stuff like sleep, water and easy stretching helps your body heal. I\'ll be here cheering when you\'re back! ❤️';

  }

  }

  // --- topic routing ---
  if(has('improve','better','faster','get good')){
    const trend = twin.fc && twin.fc.ok
      ? (twin.fc.improving ? 'Great news: your '+twin.mainEvent+' is already improving about '+Math.abs(twin.fc.pctPerMonth).toFixed(1)+'% per month! 📈' : 'Your '+twin.mainEvent+' has flattened out a bit — totally normal, every athlete plateaus. Time to mix things up! 🔁')
      : 'First step: log a few results so your Athlete Twin can spot exactly where you\'re improving. 🔮';
    body=trend+'\n\nMy 3 power moves for you:\n1️⃣ Technique day: '+sportDrill('technique')+'\n2️⃣ Consistency: you\'re training ~'+twin.perWeek.toFixed(1)+'×/week — aim for 4!\n3️⃣ '+nudge();
  }
  else if(has('today','what should i do','workout','practice plan','train today')){
    let plan;
    if(twin.daysSince===0) plan='You already trained today — nice! 🎉 If you\'re feeling good, a light 10-minute stretch or technique game is perfect. Otherwise: rest, water, sleep. Recovery = growth!';
    else if((twin.recentFeel && twin.recentFeel<2.5)||(twin.avgSleep && twin.avgSleep<7)) plan='Your Twin says your energy\'s been a bit low, so today is a RECOVERY day: '+sportDrill('recovery')+'\n\nIf you do move, keep it light: '+sportDrill('technique')+'. No pressure. 😌';
    else{
      const focusArr=['speed','endurance','technique','strength'];
      const focus=focusArr[new Date().getDay()%4];
      plan='Today\'s focus: '+focus.toUpperCase()+' ⚡\nTry this: '+sportDrill(focus)+'.\nThen log it for +25 XP!';
    }
    body=plan+'\n\n'+nudge();
  }
  else if(has('qualify','close am i','make it','varsity')||hasWord(/\bgoals?\b/)){

    } else {

    }
  }

function msgHtml(c,popIn){
  if(c.who==='me') return `<div class="msg me ${popIn?'pop':''}"><div class="bub">${esc(c.text)}</div></div>`;
  return `<div class="msg coach ${popIn?'pop':''}"><div class="face" style="overflow:hidden;align-items:flex-end;">${coachSVG(cav(),32)}</div><div class="bub">${esc(c.text)}</div></div>`;
}
function scrollChat(){ setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),60); }
function quickChat(t){ $('chat-input').value=t; sendChat(); }
function sendChat(){
  const inp=$('chat-input'); const t=inp.value.trim(); if(!t) return;
  inp.value='';
  state.chat.push({who:'me',text:t});
  const log=$('chatlog');
  log.insertAdjacentHTML('beforeend', msgHtml({who:'me',text:t},true));
  log.insertAdjacentHTML('beforeend', `<div class="msg coach" id="typing"><div class="face" style="overflow:hidden;align-items:flex-end;">${coachSVG(cav(),32)}</div><div class="bub typing"><i></i><i></i><i></i></div></div>`);
  scrollChat();
  state.game.chats++;
  setTimeout(()=>{
    const reply=coachReply(t);
    state.chat.push({who:'coach',text:reply});
    if(state.chat.length>60) state.chat=state.chat.slice(-60);
    const ty=$('typing'); if(ty) ty.remove();
    log.insertAdjacentHTML('beforeend', msgHtml({who:'coach',text:reply},true));
    ding([523]); speak(reply);
    autoQuest('chat'); checkBadges(); save(); scrollChat();
  }, 700+Math.random()*700);
}

function freshOB(){ return {step:0, data:{name:'',age:'',sport:null,height:'',weight:'',skill:'Rising Star',position:'',years:'',injury:'no',injuryNote:'',goalChips:[],goalEvent:'',goalTarget:'',goalDate:'',

  coachStyle:'🤖', coachName:'Coach Nova', coachPers:'hype', coachVoice:'coach'}}; }
let ob=freshOB();
const OB_STEPS=7;
function obDots(n){ let h='<div class="ob-dots">'; for(let i=1;i<=OB_STEPS;i++) h+=`<i class="${i<=n?'on':''}"></i>`; return h+'</div>'; }
function obNav(canNext, nextLabel){
  return `<div style="display:flex;gap:10px;margin-top:16px;">
    <button class="btn ghost" style="color:#6366F1;background:#EEF2FF;box-shadow:0 4px 0 #C7D2FE;" onclick="obBack()">←</button>
    <button class="btn indigo" style="flex:1;" ${canNext?'':'disabled'} onclick="obNext()">${nextLabel||'Next →'}</button>
  </div>`;
}
function obBack(){ if(ob.step>0){ ob.step--; renderOB(); } }
function obNext(){ if(!obValidate()) return; ob.step++; renderOB(); }
function plausibleMeasure(str,min,max){
  str=String(str||'').trim(); if(!str) return true;
  const m=str.match(/(\d+(\.\d+)?)/); if(!m) return true; // pure text — let it pass
  const n=parseFloat(m[1]);
  if(/ft|'|"/i.test(str)) return n>=2 && n<=7.6;
  return n>=min && n<=max;
}
function obValidate(){
  const d=ob.data;
  if(ob.step===1 && d.age!=='' && d.age!=null){
    const a=parseInt(d.age);
    if(isNaN(a)||a<5||a>18){ toast('Age should be a number from 5 to 18','🤔'); return false; }
  }
  if(ob.step===3){
    if(d.years!=='' && d.years!=null){
      const y=parseFloat(d.years), a=parseInt(d.age)||18;
      if(isNaN(y)||y<0||y>15){ toast('Years played should be between 0 and 15','🤔'); return false; }
      if(y>a){ toast('You can\'t have played longer than you\'ve been alive! 😄','🤔'); return false; }
    }
    if(!plausibleMeasure(d.height,80,230)){ toast('That height looks off — try something like "152 cm"','📏'); return false; }
    if(!plausibleMeasure(d.weight,18,330)){ toast('That weight looks off — double-check it','📏'); return false; }
  }
  if(ob.step===4){
    if(d.goalTarget.trim()){
      const sport=SPORTS[d.sport]||SPORTS.other;
      const t=parseVal(d.goalTarget.trim(), (sport.unit==='time'||/[:]/.test(d.goalTarget))?'time':'number');
      if(isNaN(t)||t<=0||t>86400){ toast('Goal target looks off — try a number like 59.5 or 1:05.0','🎯'); return false; }
    }
    if(d.goalDate && d.goalDate<todayStr()){ toast('Your goal date should be in the future! 📅','🤔'); return false; }
  }
  return true;
}

  if(ob.step===5){

          <div class="swatches">${HAIRCOLORS.map(c=>`<div class="sw ${av.hairColor===c?'on':''}" style="background:${c}" onclick="ob.data.avatar.hairColor='${c}';renderOB();"></div>`).join('')}</div>

          <div class="swatches">${JERSEYCOLORS.map(c=>`<div class="sw ${av.jersey===c?'on':''}" style="background:${c}" onclick="ob.data.avatar.jersey='${c}';renderOB();"></div>`).join('')}</div>
          <input type="number" value="${av.number}" min="0" max="99" style="width:90px;margin-top:6px;" onchange="ob.data.avatar.number=Math.max(0,Math.min(99,Math.round(parseFloat(this.value))||0));renderOB();">
        </div>
      </div>
      ${obNav(true)}</div>`;
    return;
  }
  if(ob.step===6){
    el.innerHTML=`<div class="ob-card">${obDots(6)}
      <h2>🤖 Create your AI coach!</h2>
      <label class="fld">Coach style</label>
      <div class="chip-row">${['🤖','🐬','🦅','🦁','🧙','⭐'].map(e=>`<button class="chip ${d.coachStyle===e?'on':''}" style="font-size:1.5rem;padding:8px 14px;" onclick="ob.data.coachStyle='${e}';ob.data.coachName=({'🤖':'Coach Nova','🐬':'Coach Splash','🦅':'Coach Sky','🦁':'Coach Roar','🧙':'Coach Sage','⭐':'Coach Star'})['${e}'];renderOB();">${e}</button>`).join('')}</div>
      <label class="fld">Coach name</label>
      <input type="text" value="${esc(d.coachName)}" maxlength="20" oninput="ob.data.coachName=this.value;">
      <label class="fld">Personality</label>
      <div class="chip-row">${[['hype','🔥 Hype — pumps you UP'],['chill','😎 Chill — calm & kind'],['wise','🦉 Wise — deep thinker'],['goofy','🤪 Goofy — makes you laugh']].map(p=>`<button class="chip ${d.coachPers===p[0]?'on':''}" onclick="ob.data.coachPers='${p[0]}';renderOB();">${p[1]}</button>`).join('')}</div>
      <label class="fld">Coach voice</label>
      <div class="chip-row">${VOICE_PRESETS.map(v=>`<button class="chip ${(d.coachVoice||'coach')===v.id?'on':''}" onclick="ob.data.coachVoice='${v.id}';previewVoice('${v.id}');renderOB();">${v.e} ${v.n}</button>`).join('')}</div>
      <p class="tiny" style="margin-top:2px;">Tap a voice to hear a sample. 🔊 (Voices come from your device, so they sound a little different on each phone or computer.)</p>

  if(ob.step===7){
    el.innerHTML=`<div class="ob-card twinload">
      <span class="orb">🔮</span>

    </div>`;
    const msgs=[['Reading your profile…',20],['Teaching your AI coach…',45],['Calibrating forecast engine…',70],['Generating your first quests…',90],['Ready! 🎉',100]];
    msgs.forEach((x,i)=>setTimeout(()=>{ const b=$('twin-bar'),s=$('twin-sub'); if(b){b.style.width=x[1]+'%'; s.textContent=x[0];} if(x[1]===100) setTimeout(finishOB,500); }, 500+i*550));

}
